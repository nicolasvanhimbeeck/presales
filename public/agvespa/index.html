<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AG Vespa — Mockup</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card-bg: #ffffff;
      --border: #e3e6ee;
      --text: #1c1f2a;
      --muted: #6b7280;
      --accent: #4f46e5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 480px;
      box-shadow: 0 8px 24px rgba(20, 20, 43, 0.06);
    }
    .eyebrow {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .5rem;
    }
    h1 { margin: 0 0 .75rem; font-size: 1.4rem; }
    p { margin: 0; color: var(--muted); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Presales mockup</div>
    <h1>AG Vespa</h1>
    <p>Placeholder-pagina voor dit traject. Vervang dit bestand door de echte mockup zodra die klaar is.</p>
  </div>
</body>
</html>
